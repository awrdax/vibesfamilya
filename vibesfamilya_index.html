<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vibesfamilya</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#05070f;
  color:white;
  overflow:hidden;
}

#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.header{
  text-align:center;
  margin-top:20px;
  font-size:26px;
  letter-spacing:4px;
  font-weight:bold;
  color:#ff3b3b;
  text-shadow:0 0 15px #ff3b3b, 0 0 20px #4aa3ff;
}

.top-name{
  text-align:center;
  margin-top:10px;
  font-size:34px;
  font-weight:bold;
}

.top-name span{
  color:#4aa3ff;
  font-size:18px;
  margin-left:10px;
}

.sub-row{
  display:flex;
  justify-content:space-between;
  padding:10px 40px;
  font-size:16px;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  backdrop-filter: blur(12px);
  margin-bottom:20px;
}

.member{
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  background: rgba(255,255,255,0.05);
}

.vip{
  border-left:3px solid #b84dff;
  box-shadow:0 0 10px rgba(184,77,255,0.4);
}

.admin{
  border-left:3px solid #ff3b3b;
  box-shadow:0 0 12px rgba(255,59,59,0.5);
}

input{
  width:90%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  outline:none;
  background:#0e1325;
  color:white;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background: linear-gradient(90deg,#ff3b3b,#4aa3ff);
  color:white;
}

.footer{
  text-align:center;
  padding:20px;
  margin-top:30px;
  background: rgba(255,255,255,0.03);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">VIBES FAMİLYA</div>

<div class="top-name">MAHSEN <span>ASEL</span></div>

<div class="sub-row">
<div>EFE SARSILMAZ</div>
<div>FURKAN SALWOX</div>
</div>

<div class="container">

<div class="card">
<h3>ÜYELER</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>👤 PROFİL</h3>
<input id="username" placeholder="Kullanıcı adı">
<input id="nickname" placeholder="Takma ad">
<button onclick="createProfile()">Profil Oluştur</button>
<p id="profileInfo"></p>
</div>

<div class="card">
<h3>📊 İSTATİSTİK</h3>
<p>👀 Görüntülenme: <span id="views">0</span></p>
<p>🔵 Online: <span id="onlineCount">0</span></p>
</div>

<div class="card">
<h3>ADMIN</h3>
<input type="password" id="pass" placeholder="Şifre">
<button onclick="login()">Giriş</button>

<div id="panel" style="display:none;">
<button onclick="addMember()">Ekle</button>
<button onclick="removeMember()">Sil</button>
</div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  databaseURL: "XXX",
  projectId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

let members = [
{name:"͟͟͞͞𝘷𝘪𝘣𝐞𝐬⛧⃝𝐓𝐮𝐠𝐛𝐚 🇷🇺",role:"vip"},
{name:"͟͟͞͞𝘷𝘪𝐛𝐞𝐬⛧⃝𝐀𝐬𝐞𝐥 🇷🇺",role:"admin"}
];

function render(){
document.getElementById("list").innerHTML =
members.map(m=>`<div class="member ${m.role}">${m.name}</div>`).join("");
}
render();

function createProfile(){
db.ref("profiles/"+userId).set({
name:username.value,
nick:nickname.value
});
profileInfo.innerText = username.value + " ("+nickname.value+")";
}

function login(){
if(pass.value==="7700100zrtad"){
panel.style.display="block";
}
}

function addMember(){
members.push({name:"NEW VIP",role:"vip"});
render();
}

function removeMember(){
members.pop();
render();
}

/* online */
function setOnline(){
db.ref("online/"+userId).set(true);
db.ref("online/"+userId).onDisconnect().remove();
}
setOnline();

db.ref("online").on("value",s=>{
onlineCount.innerText=Object.keys(s.val()||{}).length;
});

/* views */
db.ref("views").transaction(v=> (v||0)+1);
db.ref("views").on("value",s=>{
views.innerText=s.val()||0;
});

/* particles */
const c=document.getElementById("bg");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:2,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function a(){
x.clearRect(0,0,c.width,c.height);
for(let i of p){
x.fillStyle="white";
x.beginPath();
x.arc(i.x,i.y,i.r,0,6.28);
x.fill();
i.x+=i.dx;i.y+=i.dy;
if(i.x<0||i.x>c.width)i.dx*=-1;
if(i.y<0||i.y>c.height)i.dy*=-1;
}
requestAnimationFrame(a);
}
a();
</script>

</body>
</html>
